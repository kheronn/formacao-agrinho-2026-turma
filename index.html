<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Agro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
   <main class="container">
    <header>
        <h1>Monitor Agro</h1>
        <p>Equilíbrio entre produção e meio ambiente!</p>
    </header>

    <section class="config-fazenda">
        <input type="number" name="producao" id="producao" placeholder="Hectares de produção">
        <input type="number" name="mata" id="mata" placeholder="Hectares de mata">
        <button id="btnAtualizar" onclick="atualizarMonitor()">Atualizar painel</button>
    </section>

    <section class="dashboard">
        <div class="card"  id="cardProducao">
            <h3>Produção agrícola</h3>
            <div class="icone">🚜</div>
            <p id="txtProducao">0 ha</p>
        </div>

        <div class="card" id="cardPreservacao">
            <h3>Área de preservação</h3>
            <div class="icone">🌳</div>
            <p id="txtPreservacao">0 ha</p>
        </div>

    </section>

    <section id="mensagemStatus" class="status-box">
        Aguardando dados para análise ...
    </section>




   </main> 
    <script src="script.js"></script>
</body>
</html>
